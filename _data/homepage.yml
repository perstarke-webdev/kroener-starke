testimonials:
  label: ""
  title: "Was Kund:innen sagen"
  items:
    - quote: "Die Zusammenarbeit mit Per war von Anfang an reibungslos. Er hat uns mit Klarheit begleitet, neue Impulse eingebracht und alles absolut zuverlässig umgesetzt. Eine seltene Kombination aus Herz, Expertise und Professionalität."
      name: "Jasper Schippmann"
      role: "Mitgründer von Onward Recruiting"
      image: "/assets/images/testimonials/jasper-schippmann.webp"
      image_alt: ""
      width: 417
      height: 608
      initials: "JS"
    - quote: "Die Arbeit mit Per ist immer 1a. Egal, welches Anliegen aufkommt, er findet eine passende Lösung. Zudem ist die Kommunikation super - schnell, einfach und unkompliziert. Was ich ihm ebenso hoch anrechne, sind seine Ideen zur Optimierung. Er setzt nicht nur gut um, sondern gibt sinnvolles Feedback, um die Dinge noch besser zu machen. Ich kann ihn jedem empfehlen, der auf der Suche nach einem sympathischen und engagierten Partner für seinen Webauftritt ist!"
      name: "Fabian Schindler"
      role: "Personal Trainer und Coach bei WIKUS Programming"
      image: "/assets/images/testimonials/fabian-schindler.webp"
      image_alt: "Fabian Schindler"
      width: 2247
      height: 3371
      initials: "FS"
    - quote: "Danke, Per, für meine neue Homepage! Ich bin rundum glücklich. Visuell wie technisch einfach top. Vom ersten Gespräch an war alles professionell, durchdacht und blitzschnell umgesetzt. Ich bin dir sehr dankbar und empfehle dich von Herzen weiter."
      name: "Astrid Groh"
      role: "Gründerin InBewegung"
      image: "/assets/images/testimonials/astrid-groh.webp"
      image_alt: ""
      width: 416
      height: 415
      initials: "AG"
    - quote: "Ich habe von Anfang an gemerkt, dass Per Starke Web Development mein Ziel und meine Vision wirklich verstanden hat. Während des gesamten Prozesses waren die Zusammenarbeit und die Unterstützung durchweg hervorragend. Und der kreative Prozess hat meine Erwartungen übertroffen, als es darum ging, meine Website zum Leben zu erwecken. Ich kann Per Starke Web Development wärmstens empfehlen!"
      name: "Joan Gilmour"
      role: "Gründerin PUPPPS"
      initials: "JG"

